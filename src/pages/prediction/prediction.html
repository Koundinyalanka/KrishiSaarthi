<ion-content>
  <ion-grid>
    <ion-row class="categoryList">
      <ion-col col-6 [ngClass]="{'active': selectedCategory == data}" *ngFor="let data of categoryList" (click)="savecategory(data)">
        <span>
          <img src="assets/imgs/crop/{{data}}.png" alt="">
        </span>
      </ion-col>
    </ion-row>
    
  
  </ion-grid>
  <ion-fab bottom right edge (click)="openCamera()">
    <button ion-fab color="greenColor">
      <ion-icon name="ios-camera-outline"></ion-icon>
    </button>
  </ion-fab>
</ion-content>
